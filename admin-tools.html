<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processor Admin Approval</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="admin-body auth-loading">
  <div class="admin-shell">
    <header class="admin-header">
      <div>
        <p class="admin-kicker">Rural India Production Chain Management System</p>
        <h1>Processor Admin Approval</h1>
      </div>
      <div class="admin-header-actions">
        <a class="btn btn-small" href="./index.html">Back to Tool</a>
      </div>
    </header>

    <main class="admin-grid">
      <section class="section admin-panel">
        <h3>Admin Login</h3>
        <form class="admin-form" id="loginForm">
          <div class="form-group">
            <label for="adminPassword">Admin Password</label>
            <input id="adminPassword" name="adminPassword" type="password" placeholder="Enter admin password" required />
          </div>
          <div class="btn-group">
            <button class="btn btn-success" type="submit">Sign In</button>
          </div>
          <p class="admin-status" id="loginStatus"></p>
        </form>

        <div id="sessionPanel" class="session-panel">
          <h3>Admin Controls</h3>
          <div class="btn-group">
            <a class="btn btn-small" href="./admin-password.html">Change Password</a>
            <button class="btn btn-warning btn-small" type="button" id="refreshQueue">Refresh Queue</button>
            <button class="btn btn-danger btn-small" type="button" id="signOutButton">Sign Out</button>
          </div>
          <p class="admin-status" id="sessionStatus"></p>
        </div>
      </section>

      <section class="section admin-panel queue-panel" id="queuePanel">
        <h3>Pending Processor Queue</h3>
        <p class="admin-helper" id="queueMeta">Sign in as admin to load pending submissions.</p>
        <div class="form-group">
          <label for="queueSearch">Search Pending Processors</label>
          <input id="queueSearch" type="search" placeholder="Search by name, input, output, description..." />
        </div>
        <div class="admin-card-list" id="queueList"></div>
      </section>

      <section class="section admin-panel queue-panel" id="allProcessorsPanel">
        <h3>All Processor Records</h3>
        <p class="admin-helper" id="allProcessorsMeta">Sign in as admin to load all processors.</p>
        <div class="form-group">
          <label for="allProcessorsSearch">Search All Processors</label>
          <input id="allProcessorsSearch" type="search" placeholder="Search by name, input, output, description..." />
        </div>
        <div class="admin-card-list" id="allProcessorsList"></div>
      </section>
    </main>
  </div>

  <div class="admin-modal hidden" id="editProcessorModal">
    <div class="admin-modal-backdrop" data-close-edit></div>
    <div class="admin-modal-dialog">
      <div class="admin-card-header">
        <h3>Edit Processor</h3>
        <button class="btn btn-small btn-danger" type="button" data-close-edit>Close</button>
      </div>
      <form class="admin-form" id="editProcessorForm">
        <input id="editProcessorId" type="hidden" />
        <div class="form-group">
          <label for="editProcessorName">Processor Name</label>
          <input id="editProcessorName" required />
        </div>
        <div class="form-group">
          <label for="editProcessorInputs">Inputs (comma-separated)</label>
          <textarea id="editProcessorInputs" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label for="editProcessorOutputs">Outputs (comma-separated)</label>
          <textarea id="editProcessorOutputs" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label for="editProcessorTime">Processing Time</label>
          <input id="editProcessorTime" />
        </div>
        <div class="form-group">
          <label for="editProcessorDescription">Description</label>
          <textarea id="editProcessorDescription" rows="3"></textarea>
        </div>
        <div class="btn-group">
          <button class="btn btn-success" type="submit">Save Changes</button>
        </div>
        <p class="admin-status" id="editProcessorStatus"></p>
      </form>
    </div>
  </div>

  <script src="./admin-tools.js"></script>
</body>
</html>
