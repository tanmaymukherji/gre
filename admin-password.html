<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="admin-body">
  <div class="admin-shell admin-shell-narrow">
    <header class="admin-header">
      <div>
        <p class="admin-kicker">Rural India Production Chain Management System</p>
        <h1>Change Admin Password</h1>
      </div>
      <div class="admin-header-actions">
        <a class="btn btn-small" href="./admin-tools.html">Back to Admin</a>
      </div>
    </header>

    <main>
      <section class="section admin-panel">
        <p class="admin-helper">Update the Supabase-backed admin password for processor moderation.</p>
        <form class="admin-form" id="changePasswordForm">
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <input id="currentPassword" name="currentPassword" type="password" required />
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input id="newPassword" name="newPassword" type="password" required />
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" required />
          </div>
          <div class="btn-group">
            <button class="btn btn-success" type="submit">Update Password</button>
          </div>
          <p class="admin-status" id="changePasswordStatus"></p>
        </form>
      </section>
    </main>
  </div>

  <script src="./admin-password.js"></script>
</body>
</html>
